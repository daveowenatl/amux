name: Release

# Triggered on `v*` tag push (normal release flow) and manual dispatch
# so we can test the workflow without cutting a real tag. Manual runs
# are always build-only — they never attach anything to a GitHub
# release. Publishing is gated on `github.event_name == 'push'` in the
# `release` job below, so even a manual dispatch against a tag ref
# cannot accidentally publish.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  # Release builds: no -D warnings. We don't want a fresh toolchain
  # upgrade with new warnings to break a release. Lint is enforced
  # by ci.yml on every PR/main push instead.
  RUSTFLAGS: ''

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive_ext: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-13
            archive_ext: tar.gz
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive_ext: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive_ext: zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev

      - uses: mlugg/setup-zig@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binaries
        shell: bash
        run: cargo build --release --workspace --target ${{ matrix.target }}

      - name: Stage binaries
        shell: bash
        run: |
          set -euo pipefail
          staging="amux-${{ matrix.target }}"
          mkdir -p "$staging"

          # On Windows, cargo emits <name>.exe.
          ext=""
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            ext=".exe"
          fi

          # Required binaries: the archive is broken without them, so
          # a missing source file hard-fails the job. These are the CLI
          # (`amux`) and the GUI app (`amux-app`), which ship on every
          # platform.
          required_bins=(
            "amux${ext}"
            "amux-app${ext}"
          )

          # Optional binaries: staged when available, warn-and-continue
          # when missing. `amux-agent-wrapper` only matters on Windows
          # (the compiled agent wrapper that replaces the Unix bash
          # scripts) — on macOS/Linux it builds but isn't consumed, so
          # its absence isn't fatal.
          optional_bins=(
            "amux-agent-wrapper${ext}"
          )

          for bin in "${required_bins[@]}"; do
            src="target/${{ matrix.target }}/release/${bin}"
            if [[ -f "$src" ]]; then
              cp "$src" "$staging/$bin"
              echo "Staged required $bin"
            else
              echo "::error::missing required binary $src"
              exit 1
            fi
          done

          for bin in "${optional_bins[@]}"; do
            src="target/${{ matrix.target }}/release/${bin}"
            if [[ -f "$src" ]]; then
              cp "$src" "$staging/$bin"
              echo "Staged optional $bin"
            else
              echo "::warning::missing optional binary $src — skipping"
            fi
          done

          # Windows only: stage ghostty-vt.dll next to the exes. The
          # libghostty-rs fork we patch to (see workspace Cargo.toml)
          # builds ghostty-vt as a shared library on Windows — so
          # `ghostty-vt.lib` is an import library, not a true static
          # lib, and `amux-app.exe` has `ghostty-vt.dll` in its import
          # table. Without shipping the DLL alongside the exe, launching
          # amux-app.exe fails with STATUS_DLL_NOT_FOUND (0xC0000135)
          # before `main` runs, producing a silent startup crash with
          # no stderr output.
          #
          # Selection strategy:
          # - Match the exact expected cargo/libghostty-vt-sys output
          #   path (`libghostty-vt-sys-*/out/ghostty-install/bin/`)
          #   rather than a bare filename. With warm `rust-cache`
          #   restoration, stale `libghostty-vt-sys-<oldhash>` dirs
          #   can linger alongside the current one, and `find -name`
          #   + `head -n1` would arbitrarily pick one.
          # - Use `mapfile` rather than `find | head -n1`. Under
          #   `set -o pipefail` (set at the top of this step), `head`
          #   closing its stdin after reading one line would make
          #   `find` exit with SIGPIPE, aborting the whole step
          #   before reaching the friendly error branch below.
          # - Hard-fail on both zero matches (build graph walked a
          #   different path than we expect) and multiple matches
          #   (nondeterministic packaging from cache pollution) —
          #   both are bugs we want surfaced loudly rather than
          #   shipped as a broken or stale archive.
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            dll_build_dir="target/${{ matrix.target }}/release/build"
            dll_matches=()
            if [[ -d "$dll_build_dir" ]]; then
              mapfile -t dll_matches < <(
                find "$dll_build_dir" \
                  -type f \
                  -path '*/libghostty-vt-sys-*/out/ghostty-install/bin/ghostty-vt.dll' \
                  2>/dev/null | sort
              )
            fi

            case "${#dll_matches[@]}" in
              1)
                dll_src="${dll_matches[0]}"
                cp "$dll_src" "$staging/ghostty-vt.dll"
                echo "Staged ghostty-vt.dll from $dll_src"
                ;;
              0)
                echo "::error::ghostty-vt.dll not found under $dll_build_dir/libghostty-vt-sys-*/out/ghostty-install/bin/"
                exit 1
                ;;
              *)
                echo "::error::multiple ghostty-vt.dll candidates found (stale cache entries?); refusing to pick arbitrarily:"
                printf '  %s\n' "${dll_matches[@]}"
                exit 1
                ;;
            esac
          fi

          # Include README and LICENSE so end users have something to
          # read after extracting. Skip if either file is missing so
          # the archive still builds.
          for meta in README.md LICENSE LICENSE.md; do
            if [[ -f "$meta" ]]; then
              cp "$meta" "$staging/"
            fi
          done

          ls -la "$staging"

      - name: Archive (tar.gz) — macOS / Linux
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          staging="amux-${{ matrix.target }}"
          tar -czf "${staging}.tar.gz" "$staging"
          # Surface the artifact path for the upload step.
          echo "ARCHIVE_PATH=${staging}.tar.gz" >> "$GITHUB_ENV"

      - name: Archive (zip) — Windows
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $staging = "amux-${{ matrix.target }}"
          Compress-Archive -Path $staging -DestinationPath "$staging.zip" -Force
          # Surface the artifact path for the upload step.
          Add-Content -Path $env:GITHUB_ENV -Value "ARCHIVE_PATH=$staging.zip"

      - name: Build MSIX package — Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $staging = "amux-${{ matrix.target }}"
          $msixDir = "msix-staging"

          # 1. Stage binaries + manifest + assets into a flat directory
          New-Item -ItemType Directory -Force -Path $msixDir | Out-Null
          Copy-Item "$staging/amux-app.exe" "$msixDir/"
          Copy-Item "$staging/amux.exe" "$msixDir/"
          # ghostty-vt.dll is required at runtime (import library)
          if (Test-Path "$staging/ghostty-vt.dll") {
              Copy-Item "$staging/ghostty-vt.dll" "$msixDir/"
          }
          # Optional agent wrapper
          if (Test-Path "$staging/amux-agent-wrapper.exe") {
              Copy-Item "$staging/amux-agent-wrapper.exe" "$msixDir/"
          }
          Copy-Item "packaging/msix/AppxManifest.xml" "$msixDir/"
          Copy-Item -Recurse "packaging/msix/Assets" "$msixDir/Assets"

          # 2. Update the version in AppxManifest.xml from the git tag.
          #    MSIX requires a four-part version (Major.Minor.Patch.Revision).
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          $parts = $tag -split '\.'
          while ($parts.Count -lt 4) { $parts += '0' }
          $msixVersion = ($parts[0..3]) -join '.'
          $manifest = Get-Content "$msixDir/AppxManifest.xml" -Raw
          $manifest = $manifest -replace 'Version="[^"]*"', "Version=`"$msixVersion`""
          Set-Content "$msixDir/AppxManifest.xml" $manifest
          Write-Host "MSIX version: $msixVersion"

          # 3. Generate resources.pri (required by MakeAppx for icon assets).
          #    Find MakePri.exe from Windows SDK.
          $sdkBin = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\10.*\x64" -Directory |
                    Sort-Object Name -Descending | Select-Object -First 1
          if (-not $sdkBin) {
              Write-Error "Windows SDK not found"
              exit 1
          }
          $makePri = Join-Path $sdkBin.FullName "MakePri.exe"
          $makeAppx = Join-Path $sdkBin.FullName "MakeAppx.exe"
          Write-Host "Using SDK: $($sdkBin.FullName)"

          # MakePri needs a priconfig.xml — generate one
          Push-Location $msixDir
          & $makePri createconfig /cf priconfig.xml /dq en-US /o
          & $makePri new /pr . /cf priconfig.xml /of resources.pri /o
          Pop-Location

          # 4. Build the .msix package (unsigned — signing is a separate step)
          $msixPath = "amux-${{ matrix.target }}.msix"
          & $makeAppx pack /d $msixDir /p $msixPath /o
          Write-Host "Built: $msixPath"

          # Surface for upload
          Add-Content -Path $env:GITHUB_ENV -Value "MSIX_PATH=$msixPath"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: amux-${{ matrix.target }}
          path: ${{ env.ARCHIVE_PATH }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload MSIX artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: amux-${{ matrix.target }}-msix
          path: ${{ env.MSIX_PATH }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Attach to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Only attach to a release on a real tag push. The `event_name`
    # check is load-bearing: without it, a `workflow_dispatch` run
    # against a tag ref would match `startsWith(github.ref, 'refs/tags/v')`
    # and publish, which contradicts the "manual runs are build-only"
    # contract documented at the top of this file.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.msix' \) \
            -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          echo "Publishing release for tag $tag"

          # Create the release as a draft on first run so a human can
          # review the body + assets before marking it public. Re-runs
          # (retries on a single tag) upload into the existing draft.
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --draft \
              --title "$tag" \
              --notes "Release $tag. See the commit log for changes."
          fi

          # Upload every staged asset. `--clobber` lets retries
          # replace partial uploads from a failed prior run.
          for asset in release-assets/*; do
            gh release upload "$tag" "$asset" --clobber
          done
